	<!-- Ad Blocker Stubs -->
	<script>
		if ('serviceWorker' in navigator) {
			navigator.serviceWorker.register('./sw-adblock.js').then(function(reg) {
				console.log('[AdBlock] Service Worker registered');
			}).catch(function(err) {
				console.log('[AdBlock] SW registration failed:', err);
			});
		}

		(function() {
			var noop = function() { return Promise.resolve(); };
			var noopFalse = function() { return false; };
			var noopObj = function() { return {}; };

			window.GameMonetize = { showAd: noop, displayAd: noop, showBanner: noop, hideBanner: noop, isAdBlocked: noopFalse, init: noop };
			window.gdsdk = { showAd: noop, displayAd: noop, showBanner: noop, hideBanner: noop, preloadAd: noop, cancelAd: noop, addEventListener: noop };
			window.GD_SDK = window.gdsdk;
			window.sdk = { showBanner: noop, showAd: noop };

			window.showAd = noop;
			window.displayAd = noop;
			window.showBannerAd = noop;
			window.hideBannerAd = noop;
			window.showInterstitial = noop;
			window.showRewardedAd = noop;
			window.showRewardedVideo = noop;
			window.happyTimeStart = noop;
			window.happyTimeStop = noop;

			var origCreateElement = document.createElement.bind(document);
			document.createElement = function(tag) {
				var el = origCreateElement(tag);
				if (tag.toLowerCase() === 'script') {
					var origSetSrc = Object.getOwnPropertyDescriptor(HTMLScriptElement.prototype, 'src');
					Object.defineProperty(el, 'src', {
						set: function(val) {
							var blocked = ['gamemonetize', 'adinplay', 'adsense', 'googlesyndication', 'doubleclick', 'adsbygoogle', 'adnxs', 'openx', 'rubiconproject', 'pubmatic', 'sdk.js'];
							if (blocked.some(function(b) { return val && val.indexOf(b) !== -1; })) {
								console.log('[AdBlock] Blocked ad script:', val);
								return;
							}
							origSetSrc.set.call(this, val);
						},
						get: function() { return origSetSrc.get.call(this); }
					});
				}
				return el;
			};
		})();
	</script>
