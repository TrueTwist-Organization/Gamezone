<script>
	// Intercept and bypass all remote script loading
	const originalCreateElement = document.createElement;
	document.createElement = function (tagName) {
		const el = originalCreateElement.apply(this, arguments);
		if (tagName.toLowerCase() === 'script') {
			Object.defineProperty(el, 'src', {
				set(value) {
					if (value.includes('google') || value.includes('gamemonetize') || value.includes('gamepix')) {
						console.log('Blocked remote script:', value);
						value = 'data:text/javascript,console.log("Mocked remote script loaded")';
					}
					el.setAttribute('src', value);
				},
				get() {
					return el.getAttribute('src');
				}
			});
		}
		return el;
	};

	// Mock GameMonetize SDK
	let sdkOptions = null;
	Object.defineProperty(window, 'SDK_OPTIONS', {
		get() {
			return sdkOptions;
		},
		set(val) {
			sdkOptions = val;
			if (val && typeof val.onEvent === 'function') {
				setTimeout(() => {
					console.log("Firing SDK_READY and SDK_GAME_START events");
					val.onEvent({ name: "SDK_READY" });
					val.onEvent({ name: "SDK_GAME_START" });
				}, 50);
			}
		}
	});

	window.sdk = {
		showBanner: function() {
			console.log("Mocked showBanner called");
			if (window.SDK_OPTIONS && typeof window.SDK_OPTIONS.onEvent === "function") {
				window.SDK_OPTIONS.onEvent({ name: "SDK_GAME_START" });
			}
		}
	};
</script>
